<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenStreetMap – Istanbul (H3)</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      #map {
        width: 100%;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
    <script>
      const H3_RES = 9;
      const TURKEY_GEOJSON_URL =
        "https://raw.githubusercontent.com/johan/world.geo.json/master/countries/TUR.geo.json";

      const map = L.map("map").setView([41.0082, 28.9784], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution:
          '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      }).addTo(map);

      const hexLayer = L.layerGroup().addTo(map);

      const hexStyle = {
        color: "#555",
        weight: 1,
        fillColor: "#aad3df",
        fillOpacity: 0.35,
      };

      function getBoundsPolygon(bounds) {
        const sw = bounds.getSouthWest();
        const nw = bounds.getNorthWest();
        const ne = bounds.getNorthEast();
        const se = bounds.getSouthEast();
        return [
          [sw.lat, sw.lng],
          [nw.lat, nw.lng],
          [ne.lat, ne.lng],
          [se.lat, se.lng],
          [sw.lat, sw.lng],
        ];
      }

      function updateHexagons() {
        hexLayer.clearLayers();
        if (!window.turkeyFeature) return;

        const bounds = map.getBounds();
        const polygon = getBoundsPolygon(bounds);
        let cells;
        try {
          cells = h3.polygonToCells(polygon, H3_RES);
        } catch (e) {
          console.warn("h3.polygonToCells error", e);
          return;
        }

        for (const cell of cells) {
          const [lat, lng] = h3.cellToLatLng(cell);
          const point = turf.point([lng, lat]);
          if (!turf.booleanPointInPolygon(point, window.turkeyFeature)) continue;

          const boundary = h3.cellToBoundary(cell, true);
          const latLngs = boundary.map(([lng, lat]) => [lat, lng]);
          L.polygon(latLngs, hexStyle).addTo(hexLayer);
        }
      }

      fetch(TURKEY_GEOJSON_URL)
        .then((r) => r.json())
        .then((data) => {
          const feature =
            data.type === "FeatureCollection"
              ? data.features[0]
              : data.type === "Feature"
                ? data
                : null;
          if (!feature) return;
          window.turkeyFeature = feature;
          updateHexagons();
        })
        .catch(() => {});

      map.on("moveend", updateHexagons);
    </script>
  </body>
</html>
